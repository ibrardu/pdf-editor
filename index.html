<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PDF Editor — Free Browser-Based PDF Editor</title>
<meta name="description" content="Edit PDFs directly in your browser. Upload, view, annotate, and export — no server uploads, completely client-side." />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="app">
  <!-- ====== TOOLBAR ====== -->
  <div id="toolbar" role="toolbar" aria-label="PDF editing tools">
    <!-- Brand -->
    <div class="app-brand" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
      </svg>
      PDF Editor
    </div>

    <div class="toolbar-sep" aria-hidden="true"></div>

    <!-- Tool buttons with inline SVG icons -->
    <button class="tool-btn" data-tool="select" id="tool-select" title="Select tool (V)" aria-label="Select tool">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.042 21.672 13.684 16.6m0 0-2.51 2.225.569-9.47 5.227 7.917-3.286-.672Zm-7.518-.267A8.25 8.25 0 1 1 20.25 10.5M8.288 14.212A5.25 5.25 0 1 1 17.25 10.5" /></svg>
      <span>Select</span>
      <span class="shortcut-badge">V</span>
    </button>

    <button class="tool-btn" data-tool="text" id="tool-text" title="Text tool (T)" aria-label="Text tool">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.087.16 2.185.283 3.293.369V21l4.076-4.076a1.526 1.526 0 0 1 1.037-.443 48.2 48.2 0 0 0 5.887-.51c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.4 48.4 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z" /></svg>
      <span>Text</span>
      <span class="shortcut-badge">T</span>
    </button>

    <button class="tool-btn" data-tool="draw" id="tool-draw" title="Draw tool (D)" aria-label="Draw tool">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" /></svg>
      <span>Draw</span>
      <span class="shortcut-badge">D</span>
    </button>

    <button class="tool-btn" data-tool="highlight" id="tool-highlight" title="Highlight tool (H)" aria-label="Highlight tool">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.53 16.122a3 3 0 0 0-5.78 1.128 2.25 2.25 0 0 1-2.4 2.245 4.5 4.5 0 0 0 8.4-2.245c0-.399-.078-.78-.22-1.128Zm0 0a15.998 15.998 0 0 0 3.388-1.62m-5.043-.025a15.994 15.994 0 0 1 1.622-3.395m3.42 3.42a15.995 15.995 0 0 0 4.764-4.648l3.876-5.814a1.151 1.151 0 0 0-1.597-1.597L14.146 6.32a15.996 15.996 0 0 0-4.649 4.763m3.42 3.42a6.776 6.776 0 0 0-3.42-3.42" /></svg>
      <span>Highlight</span>
      <span class="shortcut-badge">H</span>
    </button>

    <button class="tool-btn" data-tool="shape" id="tool-shape" title="Shape tool (S)" aria-label="Shape tool">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 7.5A2.25 2.25 0 0 1 7.5 5.25h9a2.25 2.25 0 0 1 2.25 2.25v9a2.25 2.25 0 0 1-2.25 2.25h-9a2.25 2.25 0 0 1-2.25-2.25v-9Z" /></svg>
      <span>Shape</span>
      <span class="shortcut-badge">S</span>
    </button>

    <div class="toolbar-sep" aria-hidden="true"></div>

    <!-- Open file -->
    <button class="file-btn" id="open-file-btn" title="Open a PDF file" aria-label="Open PDF file">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9.776c.112-.017.227-.026.344-.026h15.812c.117 0 .232.009.344.026m-16.5 0a2.25 2.25 0 0 0-1.883 2.542l.857 6a2.25 2.25 0 0 0 2.227 1.932H19.05a2.25 2.25 0 0 0 2.227-1.932l.857-6a2.25 2.25 0 0 0-1.883-2.542m-16.5 0V6A2.25 2.25 0 0 1 6 3.75h3.879a1.5 1.5 0 0 1 1.06.44l2.122 2.12a1.5 1.5 0 0 0 1.06.44H18A2.25 2.25 0 0 1 20.25 9v.776" /></svg>
      <span>Open PDF</span>
    </button>
    <input type="file" id="file-input" accept="application/pdf" />
  </div>

  <!-- ====== MAIN AREA ====== -->
  <div id="main">
    <!-- Sidebar: page thumbnails -->
    <div id="sidebar" role="navigation" aria-label="Page thumbnails">
      <div class="sidebar-heading">Pages</div>
    </div>

    <!-- Canvas area -->
    <div id="canvas-area">
      <!-- Upload zone (shown when no PDF loaded) -->
      <div id="upload-zone" role="button" tabindex="0" aria-label="Upload a PDF file">
        <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m6.75 12-3-3m0 0-3 3m3-3v6m-1.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
        </svg>
        <h2>Upload a PDF</h2>
        <p>Drag &amp; drop a file here, or click to browse</p>
        <div id="upload-error" role="alert" aria-live="polite"></div>
      </div>
      <!-- Rendered PDF page -->
      <canvas id="pdf-canvas"></canvas>
    </div>
  </div>

  <!-- ====== PAGE / ZOOM CONTROLS ====== -->
  <div id="page-controls" role="toolbar" aria-label="Page and zoom controls">
    <button class="ctrl-btn" id="prev-page" title="Previous page" aria-label="Previous page">&#9664;</button>
    <span id="page-indicator" aria-live="polite">1 / 1</span>
    <button class="ctrl-btn" id="next-page" title="Next page" aria-label="Next page">&#9654;</button>
    <div class="controls-sep" aria-hidden="true"></div>
    <button class="ctrl-btn" id="zoom-out" title="Zoom out (Ctrl −)" aria-label="Zoom out">&minus;</button>
    <span id="zoom-level" aria-live="polite">100%</span>
    <button class="ctrl-btn" id="zoom-in" title="Zoom in (Ctrl +)" aria-label="Zoom in">+</button>
    <div class="controls-sep" aria-hidden="true"></div>
    <button class="ctrl-btn" id="zoom-reset" title="Reset zoom (Ctrl 0)" aria-label="Reset zoom">Fit</button>
  </div>

  <!-- ====== STATUS BAR ====== -->
  <div id="status-bar" aria-live="polite">
    <div class="status-item">
      <span class="status-dot"></span>
      <span id="status-text">Ready</span>
    </div>
    <div class="status-item" id="status-file" style="display:none;">
      <span id="status-filename"></span>
    </div>
    <div class="status-item" id="status-pages" style="display:none;">
      <span id="status-page-info"></span>
    </div>
  </div>
</div>

<!-- CDN: pdf.js for rendering, pdf-lib for editing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<script type="module">
  import editorStore from './editorStore.js';
  import pdfRenderer from './pdfRenderer.js';
  import uploadHandler from './uploadHandler.js';
  import toolbarController from './toolbarController.js';
  import pageOps from './pageOps.js';

  // ---- CONFIGURE PDF.JS WORKER ----
  window.pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // ---- INITIALISE KEYBOARD SHORTCUTS ----
  toolbarController.init();

  // ---- DOM REFERENCES ----
  const uploadZone    = document.getElementById('upload-zone');
  const uploadError   = document.getElementById('upload-error');
  const fileInput     = document.getElementById('file-input');
  const openFileBtn   = document.getElementById('open-file-btn');
  const pdfCanvas     = document.getElementById('pdf-canvas');
  const sidebar       = document.getElementById('sidebar');
  const pageControls  = document.getElementById('page-controls');
  const pageIndicator = document.getElementById('page-indicator');
  const zoomLevel     = document.getElementById('zoom-level');
  const prevPageBtn   = document.getElementById('prev-page');
  const nextPageBtn   = document.getElementById('next-page');
  const statusText    = document.getElementById('status-text');
  const statusFile    = document.getElementById('status-file');
  const statusFilename = document.getElementById('status-filename');
  const statusPages   = document.getElementById('status-pages');
  const statusPageInfo = document.getElementById('status-page-info');

  // ---- FILE UPLOAD WIRING ----
  openFileBtn.addEventListener('click', () => fileInput.click());
  uploadZone.addEventListener('click', () => fileInput.click());
  uploadZone.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
  });

  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (file) await handleFile(file);
    fileInput.value = '';
  });

  // ---- DRAG & DROP ----
  const canvasArea = document.getElementById('canvas-area');

  canvasArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadZone.classList.add('drag-over');
  });
  canvasArea.addEventListener('dragleave', (e) => {
    if (!canvasArea.contains(e.relatedTarget)) {
      uploadZone.classList.remove('drag-over');
    }
  });
  canvasArea.addEventListener('drop', async (e) => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) await handleFile(file);
  });

  async function handleFile(file) {
    uploadError.textContent = '';
    statusText.textContent = 'Loading…';
    try {
      await uploadHandler.processFile(file);
      statusText.textContent = 'Ready';
    } catch (err) {
      uploadError.textContent = err.message;
      statusText.textContent = 'Upload failed';
    }
  }

  // ---- PAGE NAVIGATION ----
  prevPageBtn.addEventListener('click', () => {
    editorStore.setPage(editorStore.state.currentPage - 1);
  });
  nextPageBtn.addEventListener('click', () => {
    editorStore.setPage(editorStore.state.currentPage + 1);
  });

  // ---- ZOOM ----
  const ZOOM_STEP = 0.25;
  document.getElementById('zoom-out').addEventListener('click', () => {
    editorStore.setZoom(editorStore.state.zoom - ZOOM_STEP);
  });
  document.getElementById('zoom-in').addEventListener('click', () => {
    editorStore.setZoom(editorStore.state.zoom + ZOOM_STEP);
  });
  document.getElementById('zoom-reset').addEventListener('click', () => {
    editorStore.setZoom(1.0);
  });

  // ---- TOOLBAR TOOL BUTTONS ----
  document.querySelectorAll('.tool-btn[data-tool]').forEach((btn) => {
    btn.addEventListener('click', () => editorStore.setActiveTool(btn.dataset.tool));
  });

  // ---- RENDER SUBSCRIPTION ----
  let currentDocRef = null;
  let lastRenderedPage = -1;
  let lastRenderedZoom = -1;
  let lastPageOrderStr = '';
  let lastDeletedSize = -1;
  let rendering = false;

  editorStore.subscribe(async (state) => {
    // Toggle upload zone vs editor view
    const hasDoc = !!state.pdfJsDoc;
    uploadZone.classList.toggle('hidden', hasDoc);
    pdfCanvas.classList.toggle('visible', hasDoc);
    sidebar.classList.toggle('visible', hasDoc);
    pageControls.classList.toggle('visible', hasDoc);

    // Active tool highlighting
    document.querySelectorAll('.tool-btn[data-tool]').forEach((btn) => {
      btn.classList.toggle('tool-active', btn.dataset.tool === state.activeTool);
    });

    // Status bar updates
    if (hasDoc) {
      statusFile.style.display = '';
      statusFilename.textContent = state.fileName;
      statusPages.style.display = '';
      statusPageInfo.textContent = `Page ${state.currentPage} of ${state.totalPages}`;
    } else {
      statusFile.style.display = 'none';
      statusPages.style.display = 'none';
    }

    if (!hasDoc) return;

    // Page indicator & zoom display
    pageIndicator.textContent = `${state.currentPage} / ${state.totalPages}`;
    zoomLevel.textContent = `${Math.round(state.zoom * 100)}%`;

    // Enable/disable nav buttons at bounds
    prevPageBtn.disabled = state.currentPage <= 1;
    nextPageBtn.disabled = state.currentPage >= state.totalPages;

    // Render page if page or zoom changed (map display pos → original page)
    if (
      state.currentPage !== lastRenderedPage ||
      state.zoom !== lastRenderedZoom
    ) {
      lastRenderedPage = state.currentPage;
      lastRenderedZoom = state.zoom;
      if (!rendering) {
        rendering = true;
        try {
          const origPage = pageOps.displayToOriginalPage(state.currentPage);
          await pdfRenderer.renderPage(pdfCanvas, origPage);
        } finally {
          rendering = false;
        }
      }
    }

    // Render thumbnails on new doc, page-order change, or deletion change
    const orderStr = JSON.stringify(state.pageOrder);
    const delSize = state.deletedPages.size;
    if (state.pdfJsDoc !== currentDocRef || orderStr !== lastPageOrderStr || delSize !== lastDeletedSize) {
      if (state.pdfJsDoc !== currentDocRef) currentDocRef = state.pdfJsDoc;
      lastPageOrderStr = orderStr;
      lastDeletedSize = delSize;
      await renderThumbnails(state);
    }

    // Update active thumbnail highlight
    updateActiveThumbnail(state.currentPage);
  });

  // ---- THUMBNAIL RENDERING (page-order aware + drag-and-drop reorder) ----
  let dragSrcIdx = null;

  async function renderThumbnails(state) {
    const heading = sidebar.querySelector('.sidebar-heading');
    while (sidebar.lastChild && sidebar.lastChild !== heading) {
      sidebar.removeChild(sidebar.lastChild);
    }

    const order = state.pageOrder;
    for (let displayIdx = 0; displayIdx < order.length; displayIdx++) {
      const originalIndex = order[displayIdx];
      const pageNum = originalIndex + 1; // 1-based for pdf.js
      const displayPos = displayIdx + 1; // 1-based for setPage

      const wrap = document.createElement('div');
      wrap.className = 'thumb-wrap';
      wrap.dataset.page = String(displayPos);
      wrap.dataset.displayIndex = String(displayIdx);
      wrap.setAttribute('role', 'button');
      wrap.setAttribute('aria-label', `Page ${displayPos}`);
      wrap.tabIndex = 0;
      wrap.draggable = true;

      const canvas = document.createElement('canvas');
      wrap.appendChild(canvas);

      const label = document.createElement('div');
      label.className = 'thumb-label';
      label.textContent = String(displayPos);
      wrap.appendChild(label);

      // Delete/restore button
      const isDeleted = pageOps.isPageDeleted(originalIndex);
      if (isDeleted) wrap.classList.add('deleted');
      const delBtn = document.createElement('button');
      delBtn.className = 'thumb-action-btn thumb-delete-btn';
      delBtn.setAttribute('aria-label', isDeleted ? `Restore page ${displayPos}` : `Delete page ${displayPos}`);
      delBtn.title = isDeleted ? 'Restore' : 'Delete';
      delBtn.textContent = isDeleted ? '↩' : '✕';
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        pageOps.toggleDelete(originalIndex);
      });
      wrap.appendChild(delBtn);

      // Click → navigate
      wrap.addEventListener('click', () => editorStore.setPage(displayPos));
      wrap.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); editorStore.setPage(displayPos); }
      });

      // Drag-and-drop reorder
      wrap.addEventListener('dragstart', (e) => {
        dragSrcIdx = displayIdx;
        wrap.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      wrap.addEventListener('dragend', () => {
        wrap.classList.remove('dragging');
        dragSrcIdx = null;
        sidebar.querySelectorAll('.drag-over-above,.drag-over-below').forEach(
          el => el.classList.remove('drag-over-above', 'drag-over-below')
        );
      });
      wrap.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const rect = wrap.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        wrap.classList.toggle('drag-over-above', e.clientY < midY);
        wrap.classList.toggle('drag-over-below', e.clientY >= midY);
      });
      wrap.addEventListener('dragleave', () => {
        wrap.classList.remove('drag-over-above', 'drag-over-below');
      });
      wrap.addEventListener('drop', (e) => {
        e.preventDefault();
        wrap.classList.remove('drag-over-above', 'drag-over-below');
        const toIdx = parseInt(wrap.dataset.displayIndex, 10);
        if (dragSrcIdx !== null && dragSrcIdx !== toIdx) {
          pageOps.movePage(dragSrcIdx, toIdx);
        }
      });

      sidebar.appendChild(wrap);

      try {
        await pdfRenderer.renderThumbnail(canvas, pageNum);
      } catch (err) {
        console.warn(`Thumbnail render failed for page ${displayPos}:`, err);
      }
    }

    updateActiveThumbnail(state.currentPage);
  }

  function updateActiveThumbnail(currentPage) {
    document.querySelectorAll('.thumb-wrap').forEach((wrap) => {
      const isActive = parseInt(wrap.dataset.page, 10) === currentPage;
      wrap.classList.toggle('active', isActive);
      wrap.setAttribute('aria-current', isActive ? 'true' : 'false');
    });
  }
</script>

</body>
</html>
