<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PDF Editor — Free Browser-Based PDF Editor</title>
<meta name="description" content="Edit PDFs directly in your browser. Upload, view, annotate, and export — no server uploads, completely client-side." />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f4f0;
    color: #1f1e1c;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* ---- TOOLBAR ---- */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: #ffffff;
    border-bottom: 1px solid #e2e0d8;
  }
  #toolbar button {
    border: 1px solid #e2e0d8;
    background: #ffffff;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }
  #toolbar button:hover { background: #f5f4f0; }
  #toolbar .tool-active { background: #eef2ff; border-color: #818cf8; }
  #toolbar .file-btn {
    margin-left: auto;
    background: #4f46e5;
    color: #fff;
    border-color: #4f46e5;
    font-weight: 500;
  }
  #toolbar .file-btn:hover { background: #4338ca; }

  /* ---- MAIN LAYOUT ---- */
  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ---- SIDEBAR ---- */
  #sidebar {
    width: 160px;
    min-width: 160px;
    border-right: 1px solid #e2e0d8;
    background: #ffffff;
    overflow-y: auto;
    padding: 10px;
    display: none;
  }
  #sidebar.visible { display: block; }
  .thumb-wrap {
    margin-bottom: 10px;
    cursor: pointer;
    border: 2px solid transparent;
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
    background: #faf9f7;
  }
  .thumb-wrap:hover { border-color: #c7d2fe; }
  .thumb-wrap.active {
    border-color: #4f46e5;
    box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.15);
  }
  .thumb-wrap canvas {
    display: block;
    width: 100%;
    height: auto;
  }
  .thumb-label {
    text-align: center;
    font-size: 11px;
    color: #71706b;
    padding: 3px 0;
    font-variant-numeric: tabular-nums;
  }

  /* ---- CANVAS AREA ---- */
  #canvas-area {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    background: #eeecea;
  }

  /* ---- UPLOAD ZONE ---- */
  #upload-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 2px dashed #d1cfc8;
    border-radius: 16px;
    padding: 56px 40px;
    max-width: 480px;
    width: 100%;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    text-align: center;
    background: #ffffff;
  }
  #upload-zone:hover {
    border-color: #4f46e5;
    background: rgba(79, 70, 229, 0.03);
    transform: translateY(-1px);
  }
  #upload-zone.drag-over {
    border-color: #4f46e5;
    background: rgba(79, 70, 229, 0.06);
    transform: scale(1.01);
  }
  .upload-icon {
    width: 56px;
    height: 56px;
    margin-bottom: 18px;
    color: #4f46e5;
    opacity: 0.8;
  }
  #upload-zone h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #1f1e1c;
  }
  #upload-zone p {
    font-size: 14px;
    color: #71706b;
  }
  #upload-error {
    color: #dc2626;
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
  }
  #upload-zone.hidden { display: none; }

  /* ---- PDF CANVAS ---- */
  #pdf-canvas {
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    background: #fff;
    display: none;
    border-radius: 2px;
  }
  #pdf-canvas.visible { display: block; }

  /* ---- PAGE CONTROLS ---- */
  #page-controls {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: #ffffff;
    border-top: 1px solid #e2e0d8;
    justify-content: center;
    font-size: 13px;
    user-select: none;
  }
  #page-controls.visible { display: flex; }
  #page-controls button {
    border: 1px solid #e2e0d8;
    background: #ffffff;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
    line-height: 1;
  }
  #page-controls button:hover:not(:disabled) { background: #f5f4f0; }
  #page-controls button:disabled { opacity: 0.35; cursor: default; }
  #page-indicator, #zoom-level {
    min-width: 64px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    color: #3f3e3a;
  }
  .controls-sep {
    width: 1px;
    height: 20px;
    background: #e2e0d8;
    margin: 0 4px;
  }

  /* ---- VISUALLY-HIDDEN FILE INPUT ---- */
  #file-input {
    position: absolute;
    width: 1px; height: 1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    border: 0;
  }
</style>
</head>
<body>

<div id="app">
  <!-- TOOLBAR -->
  <div id="toolbar">
    <button data-tool="select" id="tool-select">Select</button>
    <button data-tool="text" id="tool-text">Text</button>
    <button data-tool="draw" id="tool-draw">Draw</button>
    <button data-tool="highlight" id="tool-highlight">Highlight</button>
    <button data-tool="shape" id="tool-shape">Shape</button>
    <button class="file-btn" id="open-file-btn" title="Open a PDF file">Open PDF</button>
    <input type="file" id="file-input" accept="application/pdf" />
  </div>

  <!-- MAIN LAYOUT -->
  <div id="main">
    <div id="sidebar" role="navigation" aria-label="Page thumbnails"></div>
    <div id="canvas-area">
      <!-- Upload zone (visible when no PDF loaded) -->
      <div id="upload-zone" role="button" tabindex="0" aria-label="Upload a PDF file">
        <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m6.75 12-3-3m0 0-3 3m3-3v6m-1.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
        </svg>
        <h2>Upload a PDF</h2>
        <p>Drag &amp; drop a file here, or click to browse</p>
        <div id="upload-error" role="alert" aria-live="polite"></div>
      </div>
      <!-- Rendered PDF page -->
      <canvas id="pdf-canvas"></canvas>
    </div>
  </div>

  <!-- PAGE / ZOOM CONTROLS -->
  <div id="page-controls" role="toolbar" aria-label="Page and zoom controls">
    <button id="prev-page" title="Previous page" aria-label="Previous page">&#9664;</button>
    <span id="page-indicator" aria-live="polite">1 / 1</span>
    <button id="next-page" title="Next page" aria-label="Next page">&#9654;</button>
    <div class="controls-sep" aria-hidden="true"></div>
    <button id="zoom-out" title="Zoom out" aria-label="Zoom out">&minus;</button>
    <span id="zoom-level" aria-live="polite">100%</span>
    <button id="zoom-in" title="Zoom in" aria-label="Zoom in">+</button>
  </div>
</div>

<!-- CDN: pdf.js for rendering, pdf-lib for editing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<script type="module">
  import editorStore from './editorStore.js';
  import pdfRenderer from './pdfRenderer.js';
  import uploadHandler from './uploadHandler.js';

  // ---- CONFIGURE PDF.JS WORKER ----
  window.pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // ---- DOM REFERENCES ----
  const uploadZone   = document.getElementById('upload-zone');
  const uploadError  = document.getElementById('upload-error');
  const fileInput    = document.getElementById('file-input');
  const openFileBtn  = document.getElementById('open-file-btn');
  const pdfCanvas    = document.getElementById('pdf-canvas');
  const sidebar      = document.getElementById('sidebar');
  const pageControls = document.getElementById('page-controls');
  const pageIndicator = document.getElementById('page-indicator');
  const zoomLevel    = document.getElementById('zoom-level');
  const prevPageBtn  = document.getElementById('prev-page');
  const nextPageBtn  = document.getElementById('next-page');

  // ---- FILE UPLOAD WIRING ----
  openFileBtn.addEventListener('click', () => fileInput.click());
  uploadZone.addEventListener('click', () => fileInput.click());
  uploadZone.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
  });

  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (file) await handleFile(file);
    fileInput.value = '';           // allow re-selecting same file
  });

  // ---- DRAG & DROP ----
  const canvasArea = document.getElementById('canvas-area');

  canvasArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadZone.classList.add('drag-over');
  });
  canvasArea.addEventListener('dragleave', (e) => {
    if (!canvasArea.contains(e.relatedTarget)) {
      uploadZone.classList.remove('drag-over');
    }
  });
  canvasArea.addEventListener('drop', async (e) => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) await handleFile(file);
  });

  async function handleFile(file) {
    uploadError.textContent = '';
    try {
      await uploadHandler.processFile(file);
    } catch (err) {
      uploadError.textContent = err.message;
    }
  }

  // ---- PAGE NAVIGATION ----
  prevPageBtn.addEventListener('click', () => {
    editorStore.setPage(editorStore.state.currentPage - 1);
  });
  nextPageBtn.addEventListener('click', () => {
    editorStore.setPage(editorStore.state.currentPage + 1);
  });

  // ---- ZOOM ----
  const ZOOM_STEP = 0.25;
  document.getElementById('zoom-out').addEventListener('click', () => {
    editorStore.setZoom(editorStore.state.zoom - ZOOM_STEP);
  });
  document.getElementById('zoom-in').addEventListener('click', () => {
    editorStore.setZoom(editorStore.state.zoom + ZOOM_STEP);
  });

  // ---- TOOLBAR TOOL BUTTONS ----
  document.querySelectorAll('#toolbar button[data-tool]').forEach((btn) => {
    btn.addEventListener('click', () => editorStore.setActiveTool(btn.dataset.tool));
  });

  // ---- RENDER SUBSCRIPTION ----
  let currentDocRef = null;
  let lastRenderedPage = -1;
  let lastRenderedZoom = -1;
  let rendering = false;

  editorStore.subscribe(async (state) => {
    // Toggle upload zone vs editor view
    const hasDoc = !!state.pdfJsDoc;
    uploadZone.classList.toggle('hidden', hasDoc);
    pdfCanvas.classList.toggle('visible', hasDoc);
    sidebar.classList.toggle('visible', hasDoc);
    pageControls.classList.toggle('visible', hasDoc);

    // Active tool highlighting
    document.querySelectorAll('#toolbar button[data-tool]').forEach((btn) => {
      btn.classList.toggle('tool-active', btn.dataset.tool === state.activeTool);
    });

    if (!hasDoc) return;

    // Page indicator & zoom display
    pageIndicator.textContent = `${state.currentPage} / ${state.totalPages}`;
    zoomLevel.textContent = `${Math.round(state.zoom * 100)}%`;

    // Enable/disable nav buttons at bounds
    prevPageBtn.disabled = state.currentPage <= 1;
    nextPageBtn.disabled = state.currentPage >= state.totalPages;

    // Render page if page or zoom changed
    if (
      state.currentPage !== lastRenderedPage ||
      state.zoom !== lastRenderedZoom
    ) {
      lastRenderedPage = state.currentPage;
      lastRenderedZoom = state.zoom;
      if (!rendering) {
        rendering = true;
        try {
          await pdfRenderer.renderPage(pdfCanvas, state.currentPage);
        } finally {
          rendering = false;
        }
      }
    }

    // Render thumbnails when a new document is loaded
    if (state.pdfJsDoc !== currentDocRef) {
      currentDocRef = state.pdfJsDoc;
      await renderThumbnails(state);
    }

    // Update active thumbnail highlight
    updateActiveThumbnail(state.currentPage);
  });

  // ---- THUMBNAIL RENDERING ----
  async function renderThumbnails(state) {
    while (sidebar.firstChild) sidebar.removeChild(sidebar.firstChild);

    for (let i = 1; i <= state.totalPages; i++) {
      const wrap = document.createElement('div');
      wrap.className = 'thumb-wrap';
      wrap.dataset.page = String(i);
      wrap.setAttribute('role', 'button');
      wrap.setAttribute('aria-label', `Go to page ${i}`);
      wrap.tabIndex = 0;

      const canvas = document.createElement('canvas');
      wrap.appendChild(canvas);

      const label = document.createElement('div');
      label.className = 'thumb-label';
      label.textContent = String(i);
      wrap.appendChild(label);

      wrap.addEventListener('click', () => editorStore.setPage(i));
      wrap.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); editorStore.setPage(i); }
      });
      sidebar.appendChild(wrap);

      // Non-blocking thumbnail render
      try {
        await pdfRenderer.renderThumbnail(canvas, i);
      } catch (err) {
        console.warn(`Thumbnail render failed for page ${i}:`, err);
      }
    }

    updateActiveThumbnail(state.currentPage);
  }

  function updateActiveThumbnail(currentPage) {
    document.querySelectorAll('.thumb-wrap').forEach((wrap) => {
      const isActive = parseInt(wrap.dataset.page, 10) === currentPage;
      wrap.classList.toggle('active', isActive);
      wrap.setAttribute('aria-current', isActive ? 'true' : 'false');
    });
  }
</script>

</body>
</html>
