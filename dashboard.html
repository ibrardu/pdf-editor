<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Agent progress dashboard</title>
<style>
  :root {
    --bg: #f5f4f0;
    --card: #ffffff;
    --border: #e2e0d8;
    --text: #1f1e1c;
    --muted: #6b6962;
    --todo: #9a978d;
    --progress: #b97a3c;
    --pushed: #7a8bb9;
    --pr-open: #8a6fb0;
    --blocked: #b03a2e;
    --done: #2f7a4f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 32px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 4px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin: 0 0 24px;
  }
  .summary {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    min-width: 110px;
  }
  .summary-card .num { font-size: 22px; font-weight: 600; }
  .summary-card .label { font-size: 12px; color: var(--muted); }
  .wave {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 16px;
  }
  .wave-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .wave-title { font-size: 15px; font-weight: 600; }
  .wave-sub { font-size: 12px; color: var(--muted); }
  .bar-track {
    height: 6px;
    background: var(--bg);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .bar-fill {
    height: 100%;
    background: var(--done);
    border-radius: 4px;
    transition: width 0.3s ease;
  }
  .features {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }
  .feature {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .feature-name {
    font-weight: 500;
  }
  .feature-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.todo { background: var(--todo); }
  .dot.in_progress { background: var(--progress); }
  .dot.pushed { background: var(--pushed); }
  .dot.pr_open { background: var(--pr-open); }
  .dot.blocked { background: var(--blocked); }
  .dot.merged { background: var(--done); }
  .pr-link {
    font-size: 11px;
    color: #3266ad;
    text-decoration: none;
  }
  .pr-link:hover { text-decoration: underline; }
  #status-line {
    font-size: 12px;
    color: var(--muted);
    margin-top: 24px;
  }
</style>
</head>
<body>

<h1>PDF editor — agent progress</h1>
<p class="subtitle">Reads live from progress.json. Refresh this page to see the latest state.</p>

<div class="summary" id="summary"></div>
<div id="waves"></div>
<p id="status-line"></p>

<script>
const STATUS_LABEL = {
  todo: "To do",
  in_progress: "In progress",
  pushed: "Pushed",
  pr_open: "PR open",
  blocked: "Blocked",
  merged: "Merged"
};

async function loadProgress() {
  const statusLine = document.getElementById("status-line");
  try {
    const res = await fetch("progress.json", { cache: "no-store" });
    if (!res.ok) throw new Error("progress.json not found");
    const data = await res.json();
    render(data);
    statusLine.textContent = "Last loaded: " + new Date().toLocaleTimeString();
  } catch (err) {
    statusLine.textContent = "Could not load progress.json: " + err.message;
  }
}

function render(data) {
  const allFeatures = data.waves.flatMap(w => w.features);
  const counts = { todo: 0, in_progress: 0, pushed: 0, pr_open: 0, blocked: 0, merged: 0 };
  allFeatures.forEach(f => counts[f.status] = (counts[f.status] || 0) + 1);

  const summary = document.getElementById("summary");
  summary.innerHTML = `
    <div class="summary-card"><div class="num">${allFeatures.length}</div><div class="label">Total features</div></div>
    <div class="summary-card"><div class="num">${counts.merged || 0}</div><div class="label">Merged</div></div>
    <div class="summary-card"><div class="num">${counts.pr_open || 0}</div><div class="label">PR open</div></div>
    <div class="summary-card"><div class="num">${counts.blocked || 0}</div><div class="label">Blocked</div></div>
  `;

  const wavesEl = document.getElementById("waves");
  wavesEl.innerHTML = data.waves.map(wave => {
    const total = wave.features.length;
    const merged = wave.features.filter(f => f.status === "merged").length;
    const pct = total ? Math.round((merged / total) * 100) : 0;

    const featureCards = wave.features.map(f => `
      <div class="feature">
        <div class="feature-name">feat(#${f.id}): ${f.name}</div>
        <div class="feature-meta">
          <span class="dot ${f.status}"></span>
          <span>${STATUS_LABEL[f.status] || f.status}</span>
        </div>
        ${f.agents ? `<div class="feature-meta">${f.agents.join(" · ")}</div>` : ""}
        ${f.pr ? `<a class="pr-link" href="${f.pr}" target="_blank">View PR ↗</a>` : ""}
      </div>
    `).join("");

    return `
      <div class="wave">
        <div class="wave-header">
          <span class="wave-title">${wave.version} — ${wave.name}</span>
          <span class="wave-sub">${merged}/${total} merged</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="features">${featureCards}</div>
      </div>
    `;
  }).join("");
}

loadProgress();
setInterval(loadProgress, 5000);
</script>

</body>
</html>
